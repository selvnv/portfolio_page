<!DOCTYPE html>
<html lang="ru" data-theme="terminal">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Владимир — Портфолио</title>
  <link rel="icon" type="image/x-icon" href="favicon.png">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Michroma&family=Jura:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Press+Start+2P&family=Fira+Code:wght@400;500;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Theme Switcher -->
  <nav class="theme-switcher" aria-label="Переключение темы оформления">
    <span class="theme-switcher__label">Тема:</span>
    <div class="theme-switcher__btns">
      <button data-theme="neumorph"   class="theme-btn" title="Neumorphism">◉</button>
      <button data-theme="neumorph-dark" class="theme-btn" title="Neumorphism Dark">◈</button>
      <button data-theme="liquid-glass" class="theme-btn" title="Liquid Glass">◒</button>
      <button data-theme="cyberpunk"  class="theme-btn" title="Cyberpunk">⬡</button>
      <button data-theme="terminal"   class="theme-btn active" title="CLI Terminal + Liquid Glass">▷</button>
    </div>
  </nav>

  <!-- ===== GLASS PANEL ===== -->
  <div class="glass-panel">
    <!-- ===== HERO ===== -->
    <header class="hero" id="hero">
      <div class="hero__inner container">
        <img class="hero__img" id="hero-img" alt="profile image">
        <div class="hero__text">
          <h1 class="hero__name" id="hero-name"></h1>
          <p class="hero__sub">Специалист по внедрению ПО • DevOps-энтузиаст • Музыкант</p>
          <div class="hero__links" id="hero-links"></div>
        </div>
      </div>
    </header>

    <!-- ===== ABOUT ===== -->
    <section class="section" id="about">
      <div class="container">
        <h2 class="section__title" id="about-title"></h2>
        <div class="about__content" id="about-content"></div>
      </div>
    </section>

    <!-- ===== WHAT I DO ===== -->
    <section class="section" id="whatido">
      <div class="container">
        <h2 class="section__title" id="whatido-title"></h2>
        <p class="whatido__intro" id="whatido-intro"></p>
        <div class="whatido__tasks" id="whatido-tasks"></div>
        <p class="whatido__outro" id="whatido-outro"></p>
      </div>
    </section>

    <!-- ===== PROJECTS ===== -->
    <section class="section" id="projects">
      <div class="container">
        <h2 class="section__title" id="projects-title"></h2>
        <p class="projects__intro" id="projects-intro"></p>
        <div class="projects__list" id="projects-list"></div>
      </div>
    </section>

    <!-- ===== EXPERIENCE ===== -->
    <section class="section" id="experience">
      <div class="container">
        <h2 class="section__title" id="experience-title"></h2>
        <p class="experience__intro" id="experience-intro"></p>
        <ul class="experience__list" id="experience-list"></ul>
        <p class="experience__outro" id="experience-outro"></p>
      </div>
    </section>

    <!-- ===== LEARNING ===== -->
    <section class="section" id="learning">
      <div class="container">
        <h2 class="section__title" id="learning-title"></h2>
        <p class="learning__intro" id="learning-intro"></p>
        <div class="learning__courses" id="learning-courses"></div>
      </div>
    </section>

    <!-- ===== SKILLS ===== -->
    <section class="section" id="skills">
      <div class="container">
        <h2 class="section__title" id="skills-title"></h2>
        <div class="skills__grid" id="skills-grid"></div>
      </div>
    </section>

    <!-- ===== WORK HISTORY ===== -->
    <section class="section" id="workhistory">
      <div class="container">
        <h2 class="section__title" id="workhistory-title"></h2>
        <div class="workhistory__list" id="workhistory-list"></div>
      </div>
    </section>

    <!-- ===== CERTIFICATES ===== -->
    <section class="section" id="certificates">
      <div class="container">
        <h2 class="section__title" id="certs-title"></h2>
        <div class="certs__grid" id="certs-grid"></div>
      </div>
    </section>

    <!-- ===== PLAYLIST ===== -->
    <section class="section" id="playlist">
      <div class="container">
        <h2 class="section__title" id="playlist-title"></h2>
        <div class="playlist__desc" id="playlist-desc"></div>
        <div class="playlist__tracks" id="playlist-tracks"></div>
      </div>
    </section>

    <!-- ===== FOOTER ===== -->
    <footer class="footer">
      <div class="container footer__inner">
        <p>&copy; 2026 unlog!c</p>
      </div>
    </footer>
  </div><!-- /glass-panel -->

  <!-- ===== LIGHTBOX ===== -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" aria-label="Закрыть">&times;</button>
    <img class="lightbox__img" id="lightbox-img" alt="">
  </div>

  <!-- ===== AUDIO PLAYER ===== -->
  <div class="audio-bar" id="audio-bar" aria-hidden="true">
    <div class="audio-bar__inner container">
      <span class="audio-bar__track-title" id="audio-track-title"></span>
      <div class="ap" id="audio-player-ui">
        <button class="ap__play" aria-label="Play/Pause">
          <svg class="ap__icon ap__icon--play" viewBox="0 0 24 24" width="20" height="20"><path d="M8 5v14l11-7z" fill="currentColor"/></svg>
          <svg class="ap__icon ap__icon--pause" viewBox="0 0 24 24" width="20" height="20"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" fill="currentColor"/></svg>
        </button>
        <span class="ap__time ap__time--current" id="ap-current">0:00</span>
        <div class="ap__progress" id="ap-progress">
          <div class="ap__progress-fill" id="ap-progress-fill"></div>
          <input type="range" class="ap__progress-input" id="ap-progress-input" min="0" max="1000" value="0" step="1" aria-label="Прогресс">
        </div>
        <span class="ap__time ap__time--total" id="ap-total">0:00</span>
        <div class="ap__volume">
          <span class="ap__volume-icon" id="ap-volume-icon">🔊</span>
          <input type="range" class="ap__volume-input" id="ap-volume-input" min="0" max="100" value="100" step="1" aria-label="Громкость">
        </div>
      </div>
      <audio id="audio-player"></audio>
      <button class="audio-bar__close" aria-label="Закрыть плеер">&times;</button>
    </div>
  </div>

  <script src="info.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
